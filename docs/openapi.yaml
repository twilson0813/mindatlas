openapi: '3.0.3'
info:
  title: MindAtlas API
  description: AI-powered mapping and organization web application API
  version: 0.1.0
  contact:
    name: MindAtlas Team

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: auth
    description: User authentication and session management
  - name: items
    description: Item CRUD and relationship operations
  - name: ai
    description: AI mapping and categorization
  - name: integrations
    description: Third-party integrations (Notion)
  - name: webhooks
    description: Webhook endpoints (n8n, Stripe)
  - name: csv
    description: CSV import and export
  - name: keys
    description: API key management
  - name: sms
    description: SMS input channel
  - name: billing
    description: Subscription and billing management
  - name: admin
    description: Administrative operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT access token obtained from POST /api/auth/login.
        Tokens expire after 15 minutes; use /api/auth/refresh to renew.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        API key created via POST /api/keys.
        Used for programmatic/webhook access.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid email or password
      required: [error]

    ValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        phone_number:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        content:
          type: string
        content_type:
          type: string
          enum: [plain_text, link, code_snippet, note, task, idea, file, custom]
        metadata:
          type: object
          nullable: true
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ItemCreate:
      type: object
      properties:
        content:
          type: string
          description: The content of the item
        content_type:
          type: string
          enum: [plain_text, link, code_snippet, note, task, idea, file, custom]
        metadata:
          type: object
          nullable: true
      required: [content, content_type]

    Relationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_item_id:
          type: string
          format: uuid
        target_item_id:
          type: string
          format: uuid
        relationship_type:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        prefix:
          type: string
        created_at:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        plan:
          type: string
        status:
          type: string
          enum: [active, canceled, past_due]
        current_period_end:
          type: string
          format: date-time

    HealthCheck:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        environment:
          type: string

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: Creates a new user account with email and password
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: >
                    Min 8 chars, one uppercase, one lowercase,
                    one digit, one special character
              required: [email, password]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error (weak password or invalid email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/login:
    post:
      tags: [auth]
      summary: Authenticate user
      description: >
        Validates credentials and returns JWT token pair.
        Account locks after 5 failed attempts for 15 minutes.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '423':
          description: Account locked due to failed attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      description: Issues a new access token using a valid refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/items:
    get:
      tags: [items]
      summary: List user items
      description: Returns all items owned by the authenticated user
      operationId: listItems
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                  total:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [items]
      summary: Create an item
      description: >
        Creates a new item. Rate limited to 100 requests/min per user.
      operationId: createItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/items/{id}:
    get:
      tags: [items]
      summary: Get item by ID
      operationId: getItem
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — item belongs to another user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [items]
      summary: Delete an item
      operationId: deleteItem
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/items/{id}/relationships:
    get:
      tags: [items, ai]
      summary: Get item relationships
      description: Returns AI-detected relationships for a specific item
      operationId: getItemRelationships
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  relationships:
                    type: array
                    items:
                      $ref: '#/components/schemas/Relationship'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/items/upload:
    post:
      tags: [items]
      summary: Upload a file as an item
      description: >
        Accepts file uploads up to 25 MB. Supported types include
        PDF, PNG, JPG, GIF, TXT, MD, CSV, JSON, and code files.
      operationId: uploadItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                metadata:
                  type: string
                  description: JSON-encoded metadata object
      responses:
        '201':
          description: File uploaded and item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: Unsupported file type or missing file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File exceeds 25 MB size limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/csv/import:
    post:
      tags: [csv]
      summary: Import items from CSV
      description: Bulk-imports items from an uploaded CSV file
      operationId: csvImport
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file to import
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                        message:
                          type: string
        '400':
          description: Invalid CSV format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/csv/export/items:
    get:
      tags: [csv]
      summary: Export items as CSV
      operationId: csvExportItems
      security:
        - BearerAuth: []
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/csv/export/maps:
    get:
      tags: [csv]
      summary: Export maps as CSV
      operationId: csvExportMaps
      security:
        - BearerAuth: []
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/csv/template:
    get:
      tags: [csv]
      summary: Download CSV import template
      description: Returns a blank CSV template with correct headers
      operationId: csvTemplate
      responses:
        '200':
          description: CSV template file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /api/sms/incoming:
    post:
      tags: [sms]
      summary: Receive incoming SMS
      description: >
        Webhook endpoint for Twilio. Creates an item from SMS body
        if the sender phone number is registered.
      operationId: smsIncoming
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                From:
                  type: string
                  description: Sender phone number
                Body:
                  type: string
                  description: SMS message content
              required: [From, Body]
      responses:
        '200':
          description: SMS processed (TwiML response)
          content:
            text/xml:
              schema:
                type: string
        '204':
          description: Unregistered number — message discarded

  /api/webhooks/n8n:
    post:
      tags: [webhooks]
      summary: n8n webhook
      description: Accepts item creation requests from n8n workflows
      operationId: webhookN8n
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          description: Invalid or missing API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/webhooks/stripe:
    post:
      tags: [webhooks]
      summary: Stripe webhook
      description: >
        Receives Stripe event notifications. Verified via signature header.
        No authentication required — uses Stripe webhook secret.
      operationId: webhookStripe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        '400':
          description: Invalid webhook signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/keys:
    get:
      tags: [keys]
      summary: List API keys
      description: Returns all API keys for the authenticated user (prefixes only)
      operationId: listKeys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [keys]
      summary: Create an API key
      description: Generates a new API key. The full key is shown only once.
      operationId: createKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Friendly label for the key
              required: [name]
      responses:
        '201':
          description: API key created (full key returned once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  key:
                    type: string
                    description: Full API key — store securely
                  prefix:
                    type: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/keys/{id}:
    delete:
      tags: [keys]
      summary: Revoke an API key
      operationId: deleteKey
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Key revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/notion/connect:
    post:
      tags: [integrations]
      summary: Connect Notion workspace
      description: Stores a Notion access token and workspace info
      operationId: notionConnect
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                workspace_id:
                  type: string
                workspace_name:
                  type: string
              required: [access_token, workspace_id, workspace_name]
      responses:
        '201':
          description: Notion connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace_id:
                    type: string
                  workspace_name:
                    type: string
                  connected_at:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/notion/import:
    post:
      tags: [integrations]
      summary: Import from Notion
      description: Imports pages from the connected Notion workspace as items
      operationId: notionImport
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                database_id:
                  type: string
                  description: Optional Notion database to import from
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  items_imported:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No Notion connection found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/notion/export:
    post:
      tags: [integrations]
      summary: Export to Notion
      description: Exports items to the connected Notion workspace
      operationId: notionExport
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                item_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Export results
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages_created:
                    type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No Notion connection found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/notion/status:
    get:
      tags: [integrations]
      summary: Get Notion connection status
      operationId: notionStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Connection details
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                  workspace_id:
                    type: string
                  workspace_name:
                    type: string
                  connected_at:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/integrations/notion/disconnect:
    delete:
      tags: [integrations]
      summary: Disconnect Notion workspace
      operationId: notionDisconnect
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Disconnected
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No active connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/billing/subscription:
    get:
      tags: [billing]
      summary: Get current subscription
      operationId: getSubscription
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/billing/subscribe:
    post:
      tags: [billing]
      summary: Subscribe to a plan
      operationId: subscribe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id:
                  type: string
                payment_method_id:
                  type: string
              required: [plan_id, payment_method_id]
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Invalid plan or payment method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/billing/upgrade:
    post:
      tags: [billing]
      summary: Upgrade subscription
      operationId: upgradePlan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id:
                  type: string
              required: [plan_id]
      responses:
        '200':
          description: Plan upgraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Invalid upgrade path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/billing/downgrade:
    post:
      tags: [billing]
      summary: Downgrade subscription
      operationId: downgradePlan
      security:
        - BearerAuth: []
