name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mindatlas
          POSTGRES_PASSWORD: mindatlas
          POSTGRES_DB: mindatlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mindatlas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://mindatlas:mindatlas@localhost:5432/mindatlas_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      ENCRYPTION_MASTER_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run migrate:up

      - name: Run unit and property-based tests
        run: npm test

      - name: Run client tests
        run: npm run test:client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Build client
        run: npm run build:client

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 3
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to target environment
        run: |
          echo "Deploying image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # TODO: Replace with actual deployment command for your target environment
          # Examples:
          #   - kubectl set image deployment/mindatlas app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          #   - ssh $DEPLOY_HOST 'docker pull ... && docker-compose up -d'
          #   - aws ecs update-service --cluster mindatlas --service app --force-new-deployment
          echo "Deployment placeholder - configure for your target environment"

      - name: Verify deployment health
        run: |
          echo "Health check placeholder - configure for your target environment"
          # TODO: Replace with actual health check
          # Example: curl -f https://your-domain.com/health || exit 1

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build, docker, deploy]
    if: failure()

    steps:
      - name: Set commit status to failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'CI/CD pipeline failed',
              context: 'ci-cd/pipeline'
            });
